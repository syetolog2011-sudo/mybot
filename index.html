<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RacoonGifts</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <header class="app-header">
        <button class="menu-btn">☰</button>
        <div class="wallet-container">
            <div class="balance-badge token-blue">
                <span class="icon">💎</span>
                <span id="balance-stars">0.40</span>
            </div>
            <div class="balance-badge token-gold">
                <span class="icon">🪙</span>
                <span id="balance-coins">12500</span>
            </div>
            <button class="deposit-btn">+</button>
        </div>
        <div class="profile-avatar"><span class="avatar-emoji">🦝</span></div>
    </header>

    <div class="content-wrapper">

        <section id="tab-cases" class="tab-content">
            
            <div id="cases-list-view">
                <div class="live-feed">
                    <span class="live-indicator">● LIVE</span>
                    <div class="feed-items">
                        <div class="feed-item">🏆</div>
                        <div class="feed-item">🎁</div>
                    </div>
                </div>
                <div class="section-title">
                    <h3>Промо</h3>
                    <span class="badge-count">1</span>
                </div>
                <div class="cases-grid">
                    <div class="case-card orange-case" onclick="openCaseMenu('BAD', 14)">
                        <span class="case-counter">🎫 11</span>
                        <div class="case-img">📦</div>
                        <h4>BAD</h4>
                        <button class="btn-case-action">Открыть</button>
                    </div>
                </div>
            </div>

            <div id="case-inner-view" class="hidden">
                <button class="back-btn" onclick="closeCaseMenu()">❮ Назад</button>
                
                <h2 id="inner-case-title" class="tab-title-center">BAD</h2>

                <div class="roulette-wrapper">
                    <div class="roulette-marker"></div>
                    <div id="roulette-container-box" class="roulette-container-box">
                        </div>
                </div>

                <div class="case-controls">
                    <button id="fast-open-btn" class="btn-fast-open">Быстрое открытие <span id="case-price-tag">💎 14</span></button>
                    
                    <div class="multiplier-row">
                        <button class="mult-btn active" onclick="setCount(1, this)">×1</button>
                        <button class="mult-btn" onclick="setCount(2, this)">×2</button>
                        <button class="mult-btn" onclick="setCount(3, this)">×3</button>
                    </div>
                </div>

                <div class="section-title">
                    <h3>Содержимое кейса</h3>
                    <span class="badge-count">5</span>
                </div>
                <div class="inventory-grid content-grid">
                    <div class="inv-item rarity-epic">👜<span class="price">Эпик</span></div>
                    <div class="inv-item rarity-rare">💪<span class="price">Редкое</span></div>
                    <div class="inv-item rarity-common">🍒<span class="price">Обычное</span></div>
                    <div class="inv-item rarity-epic">💎<span class="price">Эпик</span></div>
                    <div class="inv-item rarity-rare">🚀<span class="price">Редкое</span></div>
                </div>
            </div>
        </section>

        <section id="tab-upgrade" class="tab-content hidden"><h2 class="tab-title-center">Апгрейд (В разработке)</h2></section>
        <section id="tab-slots" class="tab-content hidden"><h2 class="tab-title-center">Слоты (В разработке)</h2></section>
        <section id="tab-craft" class="tab-content hidden"><h2 class="tab-title-center">Крафт (В разработке)</h2></section>
        <section id="tab-profile" class="tab-content hidden"><h2 class="tab-title-center">Профиль (В разработке)</h2></section>

    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" data-tab="tab-cases"><span class="nav-icon">🎁</span><span class="nav-text">Кейсы</span></button>
        <button class="nav-item" data-tab="tab-upgrade"><span class="nav-icon">📈</span><span class="nav-text">Апгрейд</span></button>
        <button class="nav-item" data-tab="tab-slots"><span class="nav-icon">🎰</span><span class="nav-text">Слоты</span></button>
        <button class="nav-item" data-tab="tab-craft"><span class="nav-icon">🛠</span><span class="nav-text">Крафт</span></button>
        <button class="nav-item" data-tab="tab-profile"><span class="nav-icon">👤</span><span class="nav-text">Профиль</span></button>
    </nav>

</body>
</html>
